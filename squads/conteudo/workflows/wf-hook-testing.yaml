name: wf-hook-testing
description: Workflow de teste de hooks com framework Hormozi 70-20-10 — geracao, teste, analise e otimizacao
version: "1.0"

phases:
  - id: geracao
    name: Geracao de Hooks
    agent: content-chief
    description: Gerar batch de hooks usando framework 70-20-10
    veto_condition: "Nicho ou avatar nao definidos ou formato alvo indefinido -> VETO. Hook que viola filtro-anti-ia §1, §2 ou §8 -> VETO."
    elicit: true
    task: create-hook-batch
    pre_requisites:
      - "OBRIGATORIO: Ler checklists/filtro-anti-ia.md antes de gerar hooks. Hook batido (qualquer item §1) ou com fingerprint IA (§2) e VETO automatico."
    steps:
      - Coletar nicho, avatar e formato alvo
      - Consultar banco de hooks (data/hooks-bank.md)
      - Gerar 70% hooks comprovados adaptados ao nicho (filtrando contra §1, §2 do filtro anti-IA)
      - Gerar 20% variacoes e combinacoes
      - Gerar 10% hooks experimentais/contraintuitivos
      - Categorizar por tipo e nivel de risco
      - Auto-validar cada hook contra §9 TESTE FINAL antes de entregar batch
      - Entregar batch organizado (default 20 hooks)
    outputs:
      - batch_hooks_comprovados
      - batch_hooks_variacoes
      - batch_hooks_experimentais
    checkpoint: Batch completo com 20+ hooks categorizados

  - id: teste
    name: Teste de Performance
    agent: content-planner
    description: Planejar e executar teste dos hooks em conteudo real
    veto_condition: "Batch com menos de 20 hooks ou proporcao 70-20-10 nao respeitada -> VETO"
    depends_on: [geracao]
    elicit: true
    steps:
      - Selecionar 10 hooks do batch para teste (mix de categorias)
      - Criar conteudo completo para cada hook (carrossel, reels ou stories)
      - Definir calendario de publicacao (1-2 hooks/dia por 5-7 dias)
      - Definir metricas de acompanhamento por hook
      - Publicar e coletar dados
    outputs:
      - calendario_teste
      - conteudos_com_hooks
      - metricas_baseline
    checkpoint: 10 hooks testados com metricas coletadas
    metricas:
      - views_por_hook
      - engagement_rate_por_hook
      - saves_por_hook
      - comments_por_hook
      - dms_por_hook

  - id: analise
    name: Analise de Resultados
    agent: content-validator
    description: Analisar performance dos hooks e identificar padroes de sucesso
    veto_condition: "Menos de 10 hooks testados ou metricas nao coletadas (views, engagement, saves) -> VETO"
    depends_on: [teste]
    elicit: false
    steps:
      - Compilar metricas de todos os hooks testados
      - Ranquear hooks por performance (engagement, saves, DMs)
      - Identificar padroes entre hooks que mais performaram
      - Identificar padroes entre hooks que falharam
      - Cruzar performance com tipo e nivel de risco
      - Gerar relatorio de analise
    outputs:
      - ranking_hooks
      - padroes_sucesso
      - padroes_falha
      - relatorio_analise
    checkpoint: Analise completa com padroes identificados

  - id: otimizacao
    name: Otimizacao e Novo Batch
    agent: content-chief
    description: Gerar novo batch otimizado baseado nos aprendizados
    veto_condition: "Analise sem padroes de sucesso/falha identificados ou ranking de hooks ausente -> VETO"
    depends_on: [analise]
    elicit: true
    steps:
      - Aplicar aprendizados da analise ao framework 70-20-10
      - Aumentar peso dos padroes que funcionaram
      - Descartar padroes que falharam
      - Gerar novo batch de 20 hooks otimizado
      - Atualizar banco de hooks (data/hooks-bank.md) com novos comprovados
      - Definir proximo ciclo de teste
    outputs:
      - batch_hooks_otimizado
      - banco_hooks_atualizado
      - plano_proximo_ciclo
    checkpoint: Novo batch pronto + banco de hooks atualizado

quality_gates:
  - id: QG_HT_001
    name: Batch Proportion
    phase: geracao
    check: "Batch segue proporcao 70-20-10 (comprovados/variacoes/experimentais)"
    action_on_fail: "Rebalancear batch"
  - id: QG_HT_002
    name: Test Sample Size
    phase: teste
    check: "Minimo 10 hooks testados com metricas completas"
    threshold: 10
    action_on_fail: "Completar testes antes de analisar"
  - id: QG_HT_003
    name: Pattern Significance
    phase: analise
    check: "Padroes de sucesso/falha identificados com base em dados reais"
    action_on_fail: "Registrar dados sem criar padroes falsos"
