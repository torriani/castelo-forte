name: wf-create-content
description: Workflow completo de criacao de conteudo — do briefing a entrega validada pelo oraculo
version: "2.0"

phases:
  - id: briefing
    name: Briefing e Coleta
    agent: content-chief
    description: Coletar informacoes completas do usuario para direcionar a criacao
    elicit: true
    steps:
      - Perguntar tema/assunto principal do conteudo
      - Perguntar publico-alvo especifico (avatar)
      - Perguntar intencao (educar, vender, engajar, converter, doutrinar)
      - Perguntar formato desejado (carrossel, reels, stories)
      - Identificar oferta ou CTA desejado
      - Confirmar tom de voz (imperial padrao ou variacao)
    outputs:
      - tema
      - publico_alvo
      - intencao
      - formato
      - oferta_cta
      - tom_voz
    checkpoint: Briefing completo com todas as 6 informacoes coletadas
    veto_condition: Formato indefinido ou intencao ausente — nao avancar sem ambos

  - id: pesquisa_contexto
    name: Pesquisa e Contexto
    agent: content-chief
    description: Diagnosticar configuracao ideal e reunir contexto para criacao
    depends_on: [briefing]
    elicit: true
    steps:
      - Selecionar tipo de post ideal (7 tipos disponiveis)
      - Selecionar framework de copy adequado (9 frameworks)
      - Definir tamanho e estrutura (numero de slides, duracao, sequencia)
      - Pesquisar hooks relevantes no banco de hooks
      - Definir abertura e angulo de abordagem
      - Apresentar configuracao ao usuario (1. Confirmar, 2. Ajustar, 3. Trocar)
    task: plan-content
    outputs:
      - tipo_post
      - framework_copy
      - tamanho_estrutura
      - hooks_selecionados
      - angulo_abordagem
    checkpoint: Configuracao confirmada pelo usuario
    veto_condition: Usuario nao aprovou a configuracao — nao iniciar criacao

  - id: criacao
    name: Criacao de Conteudo
    agent: dynamic
    description: Criar conteudo completo com base no formato e configuracao definidos
    depends_on: [pesquisa_contexto]
    elicit: true
    pre_requisites:
      - "OBRIGATORIO: Agente de escrita LE checklists/filtro-anti-ia.md antes de gerar qualquer texto (Camada 1 do filtro)"
      - "OBRIGATORIO: Aplicar filtro DURANTE a escrita, nunca produzir rascunho sujo pra limpar depois"
    steps:
      - Gerar headlines e hook de abertura (filtrando contra §1, §2, §3 do filtro anti-IA)
      - Construir argumentacao com progressao emocional (com inimigo claro — §8 do filtro)
      - Desenvolver corpo do conteudo no formato escolhido
      - Criar CTA alinhado com a intencao definida (sem CTA generico §1 do filtro)
      - Gerar caption otimizada para engajamento
      - Auto-validar §9 TESTE FINAL do filtro anti-IA antes de entregar
      - Apresentar peca ao usuario para aprovacao
    task_routing:
      carrossel: create-carousel
      reels: create-reels
      stories: create-stories
    tasks:
      - create-hook-batch
    outputs:
      - conteudo_bruto
      - headlines
      - caption
      - cta
    checkpoint: Peca criada e aprovada pelo usuario
    veto_condition: Usuario rejeitou a peca — voltar para ajustes antes de validar

  - id: validacao
    name: Validacao em 3 Camadas (Anti-IA + Oraculo + Tom)
    agent: content-validator
    description: Validar a peca aplicando Layer 0 (filtro anti-IA UNIVERSAL), Layer 1 (oraculo de formato), Layer 2 (tom do cliente). Veto bloqueante em qualquer camada.
    depends_on: [criacao]
    elicit: false
    steps:
      - "LAYER 0 — Filtro Anti-IA UNIVERSAL: rodar checklists/filtro-anti-ia.md §9 TESTE FINAL em CADA bloco. Verificar §1 (frases proibidas), §2 (fingerprints IA PT-BR), §3 (padroes estruturais), §8 (inimigo claro). VETO BLOQUEANTE: 1 violacao = reprovacao."
      - "Se Layer 0 reprovar: devolver para agente de escrita com trechos exatos marcados; NAO avancar"
      - "LAYER 1 — Oraculo de formato: aplicar oraculo-posts (carrosseis) OU oraculo-reels (reels). Calcular score. Threshold 80%."
      - "Se Layer 1 reprovar: reescrever automaticamente; NAO avancar"
      - "LAYER 2 — Tom do cliente: aplicar tom-de-voz especifico (data/nucleo.md pra Castelo Forte). Verificar bordoes, ataques, expressoes assinatura."
      - "Se Layer 2 reprovar: devolver com gaps de tom apontados"
      - "Calcular score final consolidado (somente apos passar nas 3 camadas)"
    task: audit-content
    retry_on_fail: true
    max_retries: 3
    outputs:
      - layer_0_anti_ia_status  # PASS | FAIL com trechos violados
      - layer_1_oraculo_score   # numerico
      - layer_2_tom_status      # PASS | FAIL com gaps
      - score_final_consolidado
      - peca_validada
      - feedback_ajustes
    checkpoint: Peca aprovada em Layer 0 + Layer 1 (>= 80%) + Layer 2
    veto_condition: "QUALQUER camada reprovada apos 3 tentativas — escalar para content-chief. Layer 0 NUNCA aceita compromisso (compliance binario)."

  - id: entrega
    name: Entrega Final
    agent: content-chief
    description: Entregar conteudo formatado com sugestoes de repurpose e proximos passos
    depends_on: [validacao]
    elicit: false
    steps:
      - Formatar conteudo final no padrao de entrega
      - Gerar sugestoes de repurpose (carrossel → reels, reels → stories, etc.)
      - Incluir notas de execucao (horario ideal, hashtags, formato visual)
      - Sugerir proximos conteudos relacionados
    task: repurpose-content
    outputs:
      - conteudo_final
      - caption_final
      - sugestoes_repurpose
      - notas_execucao
    checkpoint: Entrega formatada e pronta para publicacao
    veto_condition: Peca nao validada pelo oraculo (score < 80%) ou nao aprovada pelo usuario — nao entregar sem validacao completa

quality_gates:
  - id: QG_CC_000
    name: Anti-IA Filter (UNIVERSAL — Layer 0)
    phase: validacao
    severity: BLOCKING
    check: "Layer 0 PASS: zero violacoes em filtro-anti-ia.md §1, §2, §3, §8; §9 TESTE FINAL passou em todos os blocos"
    action_on_fail: "Devolver IMEDIATAMENTE pro agente de escrita com trechos exatos marcados. NAO avancar pra Layer 1 nem Layer 2. NAO publicar. Compliance binario: 1 violacao = reprovacao."
  - id: QG_CC_001
    name: Briefing Completeness
    phase: briefing
    check: "6 informacoes coletadas (tema, publico, intencao, formato, oferta/CTA, tom)"
    action_on_fail: "Nao avancar — coletar informacoes faltantes"
  - id: QG_CC_002
    name: User Approval
    phase: pesquisa_contexto
    check: "Configuracao (tipo + framework + tamanho) confirmada pelo usuario"
    action_on_fail: "Voltar para ajustes"
  - id: QG_CC_003
    name: Oraculo Score
    phase: validacao
    check: "Score >= 80% no oraculo (posts ou reels)"
    threshold: 80
    action_on_fail: "Reescrever (max 3 tentativas), escalar para content-chief"

metricas:
  score_minimo_oraculo: 80
  max_retries_validacao: 3
  formatos_suportados: [carrossel, reels, stories]
