  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # T10 + T11 — PADRÃO ÚNICO CASA DE ISABEL (Castelo Forte)
  # Atualizado em 2026-05-25 — substitui versão antiga (Archivo Black + orange)
  # Referência visual: outputs/demo-casa-isabel-2026-05-25/
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  T10:
    name: castelo-forte-editorial
    family: castelo-forte
    title: "Castelo Forte — Casa de Isabel (Carrossel)"
    description: "PADRÃO ÚNICO da Igreja Castelo Forte. Estilo Casa de Isabel: fundo off-white (#efefef), texto midnight (#153247), Inter 700 + Playfair Display italic 500 nas palavras-chave, logo Castelo Forte no canto superior direito, layout centralizado com divider 1px vertical entre headline e body. 7 slides: capa + interna (3-4) + tríade + verso + cta. NUNCA usar orange como acento, NUNCA usar Archivo Black UPPERCASE."
    showcase: templates/carousel/castelo-forte-editorial/SHOWCASE.html
    source: templates/carousel/castelo-forte-editorial/
    slides: 7
    cliente: igreja-castelo-forte
    padrao: casa-isabel
    tipografia:
      headline: "Inter 700"
      enfase: "Playfair Display italic 500"
      mono: "JetBrains Mono 600"
    cores:
      bg: "#efefef"
      txt: "#153247"
      txt_suave: "#5a6068"
    tags: [castelo-forte, casa-isabel, padrao-unico, padrão-oficial, igreja]

  T11:
    name: castelo-forte-frase
    family: castelo-forte
    title: "Castelo Forte — Casa de Isabel (Frase Única)"
    description: "PADRÃO ÚNICO da Igreja Castelo Forte pra peças de 1 slide. Mesmo padrão Casa de Isabel do T10. Frase única em fundo off-white com palavra-chave em Playfair italic. Logo no canto superior direito, referência bíblica em JetBrains Mono no rodapé, divider 1px entre frase e ref. NUNCA usar variantes midnight/orange/fort-blue/imagem (descontinuadas em 2026-05-25)."
    showcase: templates/carousel/castelo-forte-frase/SHOWCASE.html
