    variantes: [off-white]
    tipografia:
      frase: "Inter 600"
      enfase: "Playfair Display italic 500"
      mono: "JetBrains Mono 600"
    cores:
      bg: "#efefef"
      txt: "#153247"
    tags: [castelo-forte, casa-isabel, padrao-unico, frase, peça-única, igreja]

