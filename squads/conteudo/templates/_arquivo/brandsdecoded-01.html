<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>BrandsDecoded 01 — Editorial Magazine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  /* === HEADER BAR (todos os slides) === */
  .header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 10;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-bar.on-white { color: #000; }
  .header-bar.on-dark  { color: #fff; }
  .header-bar.on-red   { color: #000; }

  /* === TYPOGRAPHY === */
  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  .body-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    line-height: 1.4;
  }

  .highlight-bar {
    background: #fff;
    color: #fff;
    display: inline;
    padding: 4px 0;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  /* === AVATAR BADGE === */
  .avatar-badge {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar-badge img {
    width: 48px; height: 48px;
    border-radius: 50%; object-fit: cover;
    border: 2px solid #ddd;
  }
  .avatar-badge .handle {
    font-size: 20px; font-weight: 600; color: #000;
    display: flex; align-items: center; gap: 6px;
  }
  .avatar-badge .vcheck {
    width: 20px; height: 20px; background: #1D9BF0;
    border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center;
    position: relative;
  }
  .avatar-badge .vcheck::after {
    content: ''; position: absolute;
    top: 5px; left: 7px;
    width: 4px; height: 8px;
    border: solid #fff; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  /* === CTA BAR === */
  .cta-bar {
    position: absolute;
    bottom: 40px; left: 40px; right: 40px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px 32px;
    text-align: center;
    z-index: 10;
  }
  .cta-bar span {
    font-size: 20px; font-weight: 500;
    color: #fff; letter-spacing: 0.5px;
  }
  .cta-bar strong {
    font-weight: 800; color: #fff;
  }
</style>
</head>
