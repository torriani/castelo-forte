<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Bold Gradient — Carousel Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  :root {
    --bg-color: {{bg_color}};
    --text-color: {{text_color}};
    --accent-color: {{accent_color}};
    --font-family: {{font_family}};
  }

  :root {
    --bg-color: #0F0C29;
    --text-color: #FFFFFF;
    --accent-color: #E040FB;
    --font-family: 'Inter', sans-serif;
    --gradient-mid: #302B63;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: var(--font-family);
    color: var(--text-color);
    position: relative;
  }

  /* --- Gradient background with per-slide shift --- */
  .gradient-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      160deg,
      var(--bg-color) 0%,
      var(--gradient-mid) 50%,
      var(--accent-color) 120%
    );
    z-index: 0;
  }

  /* Subtle radial glow */
  .glow {
    position: absolute;
    bottom: -200px;
    right: -200px;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
    opacity: 0.15;
    z-index: 1;
    pointer-events: none;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 90px;
    position: relative;
    z-index: 2;
  }

  /* --- HOOK slide: massive bold text --- */
  .slide[data-type="hook"] .slide-text {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -2px;
    text-align: center;
    text-transform: uppercase;
  }

  /* --- CONTENT slide: bold but readable --- */
  .slide[data-type="content"] .slide-text {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.5px;
    text-align: center;
  }

  /* --- CTA slide: centered with glow button --- */
  .slide[data-type="cta"] {
    justify-content: center;
    align-items: center;
  }

  .slide[data-type="cta"] .slide-text {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 60px;
  }

  .cta-button {
    display: inline-block;
    background: var(--accent-color);
    color: var(--text-color);
    font-family: var(--font-family);
    font-size: 26px;
    font-weight: 800;
    padding: 26px 72px;
    border-radius: 60px;
    text-transform: uppercase;
    letter-spacing: 3px;
    box-shadow: 0 0 40px rgba(224, 64, 251, 0.4);
  }

  /* --- Accent keyword highlight --- */
  .highlight {
    color: var(--accent-color);
    text-shadow: 0 0 30px rgba(224, 64, 251, 0.3);
  }

  /* --- Pagination: bottom-center --- */
  .pagination {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-color);
    opacity: 0.35;
    letter-spacing: 4px;
    z-index: 3;
  }

  /* --- Brand: top-left --- */
  .brand {
    position: absolute;
    top: 48px;
    left: 60px;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-color);
    opacity: 0.3;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 3;
  }

  /* --- Noise overlay --- */
  .noise-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>

  <div class="gradient-bg"></div>
  <div class="glow"></div>
  <div class="noise-overlay"></div>

  <div class="slide" data-type="{{slide_type}}">
    <div class="slide-text">{{slide_text}}</div>

    <!-- Uncomment for CTA slides -->
    <!-- <div class="cta-button">Quero agora</div> -->
  </div>

  <div class="brand">{{brand_name}}</div>
  <div class="pagination">{{slide_number}} / {{total_slides}}</div>

</body>
</html>
