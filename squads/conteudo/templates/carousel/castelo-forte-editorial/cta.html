<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Castelo Forte Editorial - CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Archivo+Black&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #efefef;
    color: #153247;
    font-family: 'Inter', sans-serif;
    padding: 120px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 50px;
  }
  .intro {
    font-family: 'Inter', sans-serif;
    font-size: 44px;
    line-height: 1.45;
    font-weight: 500;
    opacity: 0.75;
  }
  .marca {
    font-family: 'Archivo Black', sans-serif;
    font-size: 180px;
    line-height: 0.92;
    letter-spacing: -6px;
    color: #fe5b06;
    text-transform: uppercase;
  }
  .data {
    font-family: 'Archivo Black', sans-serif;
    font-size: 78px;
    line-height: 1;
    letter-spacing: -1.5px;
    text-transform: uppercase;
  }
  .igreja {
    font-family: 'Inter', sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="intro">{{intro}}</div>
  <div class="marca">{{marca}}</div>
  <div class="data">{{data}}</div>
  <div class="igreja">{{igreja}}</div>
</body>
</html>
