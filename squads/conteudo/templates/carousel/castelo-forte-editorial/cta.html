<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Castelo Forte Editorial - CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500;1,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: #efefef;
    color: #153247;
    font-family: 'Inter', sans-serif;
    padding: 120px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
    overflow: hidden;
  }
  .logo {
    position: absolute;
    top: 48px;
    right: 48px;
    width: 170px;
    opacity: 0.85;
  }
  .logo img { width: 100%; height: auto; object-fit: contain; display: block; }
  .intro {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    line-height: 1.5;
    font-weight: 400;
    color: #5a6068;
    max-width: 680px;
    margin-bottom: 24px;
  }
  .marca {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 120px;
    line-height: 0.92;
    letter-spacing: -4px;
    color: #153247;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .marca em {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    text-transform: none;
  }
  .divider {
    width: 1px;
    height: 40px;
    background: #153247;
    opacity: 0.3;
    margin: 24px auto;
  }
  .data-cta {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: #153247;
  }
  .igreja {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #5a6068;
    margin-top: 14px;
  }
</style>
</head>
<body>
  <div class="logo"><img src="{{logo_url}}"></div>
  <div class="intro">{{intro}}</div>
  <div class="marca">{{marca}}</div>
  <div class="divider"></div>
  <div class="data-cta">{{data}}</div>
  <div class="igreja">{{igreja}}</div>
</body>
</html>
