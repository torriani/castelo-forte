<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Castelo Forte Editorial - Capa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500;1,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    background: #efefef;
    color: #153247;
    font-family: 'Inter', sans-serif;
    padding: 120px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
    overflow: hidden;
  }
  .logo {
    position: absolute;
    top: 48px;
    right: 48px;
    width: 170px;
    opacity: 0.85;
  }
  .logo img { width: 100%; height: auto; object-fit: contain; display: block; }
  .bloco { max-width: 880px; width: 100%; padding: 0 20px; }
  .h {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1.14;
    letter-spacing: -1.4px;
  }
  .h em {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="logo"><img src="{{logo_url}}"></div>
  <div class="bloco"><div class="h">{{headline}}</div></div>
</body>
</html>
