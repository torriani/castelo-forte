<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Twitter Impact</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  /* Photo background with darkening */
  .bg-photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('{{photo_url}}');
    background-size: cover;
    background-position: center;
    opacity: 0.4;
    z-index: 0;
  }

  .bg-gradient {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Dark mode */
  .dark .bg-gradient {
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.9) 100%);
  }
  .dark { background: #000; color: #fff; }

  /* Light mode */
  .light .bg-gradient {
    background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.9) 100%);
  }
  .light { background: #fff; color: #000; }

  .content-wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
    justify-content: center;
    padding: 80px 64px;
    gap: 40px;
  }

  /* Header with avatar */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.8);
  }

  .dark .avatar { border-color: rgba(255,255,255,0.8); }
  .light .avatar { border-color: transparent; }

  .header-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-name {
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .verified {
    width: 24px;
    height: 24px;
    fill: #1D9BF0;
  }

  .header-handle {
    font-size: 20px;
    font-weight: 400;
  }
  .dark .header-handle { color: rgba(255,255,255,0.5); }
  .light .header-handle { color: rgba(0,0,0,0.5); }

  /* Main text */
  .text-content {
    font-size: 42px;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: -0.5px;
  }

  .text-content strong { font-weight: 800; }

  .text-content .highlight {
    font-weight: 700;
    font-style: italic;
  }
  .dark .text-content .highlight { color: #818CF8; }
  .light .text-content .highlight { color: #4F46E5; }
</style>
</head>
<body>
<div class="{{mode}}">

  <div class="bg-photo"></div>
  <div class="bg-gradient"></div>

  <div class="content-wrap">
    <div class="header">
      <img class="avatar" src="{{avatar_url}}" alt="Avatar">
      <div class="header-info">
        <div class="header-name">
          {{brand_name}}
          <svg class="verified" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.71-3.998-3.818-3.998-.47 0-.92.084-1.336.25C14.818 2.415 13.51 1.5 12 1.5s-2.816.917-3.437 2.25c-.415-.165-.866-.25-1.336-.25-2.11 0-3.818 1.79-3.818 4 0 .494.083.964.237 1.4-1.272.65-2.147 2.018-2.147 3.6 0 1.495.782 2.798 1.942 3.486-.02.17-.032.34-.032.514 0 2.21 1.708 4 3.818 4 .47 0 .92-.086 1.335-.25.62 1.334 1.926 2.25 3.437 2.25 1.512 0 2.818-.916 3.437-2.25.415.163.865.248 1.336.248 2.11 0 3.818-1.79 3.818-4 0-.174-.012-.344-.033-.513 1.158-.687 1.943-1.99 1.943-3.484zm-6.616-3.334l-4.334 6.5c-.145.217-.382.334-.625.334-.143 0-.288-.04-.416-.126l-.115-.094-2.415-2.415c-.293-.293-.293-.768 0-1.06s.768-.294 1.06 0l1.77 1.767 3.825-5.74c.23-.345.696-.436 1.04-.207.346.23.44.696.21 1.04z"/></svg>
        </div>
        <span class="header-handle">@{{handle}}</span>
      </div>
    </div>

    <div class="text-content">{{slide_text}}</div>
  </div>

</div>
</body>
</html>
