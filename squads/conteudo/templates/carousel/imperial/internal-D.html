<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Imperial Internal D — Foto Fullbleed + Balao Embaixo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  .bg-photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('{{photo_url}}');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .card {
    position: absolute;
    bottom: 48px;
    left: 40px;
    right: 40px;
    z-index: 2;
    background: rgba(0, 0, 0, 0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .text-primary {
    font-size: 34px;
    font-weight: 600;
    line-height: 1.4;
    color: #ffffff;
  }

  .text-primary .highlight {
    color: #6366F1;
    font-weight: 700;
    font-style: italic;
  }

  .text-primary strong { font-weight: 800; }

  .text-secondary {
    font-size: 24px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255,255,255,0.65);
  }

  .watermark {
    position: absolute;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    z-index: 3;
  }
</style>
</head>
<body>

  <div class="bg-photo"></div>

  <div class="card">
    <p class="text-primary">{{slide_text}}</p>
    <p class="text-secondary">{{slide_text_secondary}}</p>
  </div>

  <div class="watermark">@{{instagram}}</div>

</body>
</html>
