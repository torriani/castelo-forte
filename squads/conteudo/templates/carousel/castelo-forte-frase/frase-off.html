<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Castelo Forte Frase - Off White</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #efefef;
    color: #153247;
    font-family: 'Inter', sans-serif;
    padding: 120px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .frase {
    font-family: 'Archivo Black', sans-serif;
    font-size: 96px;
    line-height: 1.08;
    letter-spacing: -2.5px;
    text-transform: uppercase;
  }
  .accent { color: #fe5b06; }
  .ref {
    position: absolute;
    bottom: 80px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fe5b06;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="frase">{{frase}}</div>
  <div class="ref">{{referencia}}</div>
</body>
</html>
