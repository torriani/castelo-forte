<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Castelo Forte Frase - Imagem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .bg-photo {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('{{image_url}}');
    background-size: cover;
    background-position: center;
  }
  .overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.85) 100%);
  }
  .content {
    position: absolute;
    top: 50%;
    left: 80px;
    right: 80px;
    transform: translateY(-50%);
    z-index: 5;
    color: #efefef;
  }
  .frase {
    font-family: 'Archivo Black', sans-serif;
    font-size: 88px;
    line-height: 1.08;
    letter-spacing: -2.2px;
    text-transform: uppercase;
  }
  .accent { color: #fe5b06; }
  .ref {
    position: absolute;
    bottom: 80px;
    left: 80px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fe5b06;
    font-weight: 600;
    z-index: 5;
  }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="frase">{{frase}}</div>
  </div>
  <div class="ref">{{referencia}}</div>
</body>
</html>
