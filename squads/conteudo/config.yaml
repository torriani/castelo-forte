name: conteudo
description: Squad autonomo de conteudo Instagram — ciclo completo de monitoramento, sugestao, criacao, publicacao, analytics e learning loop
version: "3.2"
language: pt-BR
tested: true
entry_agent: content-chief

executor_profile:
  type: hybrid
  primary: agent
  workers:
    - daily-monitor (scraping automatico)
    - publishing-manager (render + publish pipeline)
    - performance-tracker (coleta de metricas)
  agents:
    - content-chief (orchestracao + diagnostico)
    - carousel-creator (criacao de carrosseis)
    - reels-creator (roteiros de reels)
    - stories-strategist (sequencias de stories)
    - strategist (campanhas E1-E8)
    - content-suggester (sugestoes data-driven)
    - positioning-expert (bio + CLC + StoryAds)
    - competitor-analyst (pesquisa de concorrentes)
    - content-planner (planejamento editorial)
    - content-repurposer (adaptacao entre formatos)
    - content-validator (oraculo unificado)

agents:
  # Tier 0 — Orchestrador
  - name: content-chief
    file: agents/content-chief.md
    tier: 0
    role: orchestrador
    description: Orchestrador central. Diagnostica, recomenda e direciona.

  # Tier 1 — Criadores
  - name: carousel-creator
    file: agents/carousel-creator.md
    tier: 1
    role: criador
    description: Cria carrosseis de 1-10 slides. 7 tipos + 9 frameworks.

  - name: reels-creator
    file: agents/reels-creator.md
    tier: 1
    role: criador
    description: Roteiros de Reels. DNA BLAZE completo. 6 blocos + 7 padroes.

  - name: stories-strategist
    file: agents/stories-strategist.md
    tier: 1
    role: criador
    description: Sequencias de Stories com intencao de conversao.

  # Tier 1 — Estrategistas
  - name: strategist
    file: agents/strategist.md
    tier: 1
    role: estrategista
    description: 8 estrategias de campanha E1-E8 com cronograma integrado Feed + Stories.

  - name: content-suggester
    file: agents/content-suggester.md
    tier: 1
    role: estrategista
    description: Sugere 3 carrosseis/dia baseado em dados de monitoramento + performance historica.

  # Tier 1 — Posicionamento
  - name: positioning-expert
    file: agents/positioning-expert.md
    tier: 1
    role: posicionamento
    description: Bio Imperial, CLC, StoryAds e Sistema 21 dias.

  # Tier 1 — Pesquisa e Monitoramento
  - name: competitor-analyst
    file: agents/competitor-analyst.md
    tier: 1
    role: pesquisador
    description: Pesquisa concorrentes BR + US. Scrape, transcricao, analise de padroes.

  - name: daily-monitor
    file: agents/daily-monitor.md
    tier: 1
    role: pesquisador
    description: Monitoramento diario de concorrentes + trends. Detecta oportunidades em tempo real.

  # Tier 1 — Publicacao
  - name: publishing-manager
    file: agents/publishing-manager.md
    tier: 1
    role: executor
    description: Pipeline completo de publicacao — slides, caption, hashtags, publish via Instagram Graph API.

  # Tier 2 — Suporte
  - name: content-planner
    file: agents/content-planner.md
    tier: 2
    role: planejador
    description: Planejamento estrategico. 5 niveis de consciencia. 25 ideias/ciclo.

  - name: content-repurposer
    file: agents/content-repurposer.md
    tier: 2
    role: adaptador
    description: Adapta conteudo entre formatos (carousel→reel, reel→stories, post→campanha).

  - name: content-validator
    file: agents/content-validator.md
    tier: 2
    role: validador
    description: Oraculo unificado. Valida carrosseis (12 testes) e Reels (3 niveis).

  - name: performance-tracker
    file: agents/performance-tracker.md
    tier: 2
    role: analista
    description: Tracking pos-publicacao. Metricas 24h/48h/7d. Detecta padroes. Alimenta learning loop.

