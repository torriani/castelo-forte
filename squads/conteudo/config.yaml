dependencies:
  mcp:
    - name: playwright
      purpose: Renderizar slides HTML → PNG (screenshot 1080x1350)
    - name: ig-mcp
      purpose: Publicar carrosseis via Instagram Graph API + coletar analytics
  tools:
    - name: apify
      purpose: Scraping de concorrentes (Instagram Profile/Post Scraper)

sources:
  imperador: AGENTE IMPERADOR (sistema completo de posts intencionais, hooks, CTAs, oraculo)
  blaze: AGENTE BLAZE (sistema de Reels, 6 blocos, 7 padroes virais, 500+ hooks)
  brandcontent: BRANDCONTENT (9 frameworks de copy para carrosseis, 5 tipos abertura)
  opensquad: OPENSQUAD (pipeline HTML→Playwright→PNG para geracao de slides)

output_paths:
  base: "outputs/igreja-castelo-forte"
  structure: "{base}/{tipo}/{conteudo}/"
  rules:
    - "SEMPRE criar em pastas, NUNCA arquivos soltos na raiz"
    - "Estrutura minima: outputs/{tipo}/{conteudo}/"
    - "Tipos comuns: carrosseis, reels, stories, campanhas, multiplicar, conteudo-cultos, inteligencia"
    - "Cada peca em sua propria pasta com todos os artefatos relacionados"
  examples:
    - "outputs/campanhas/em-cristo-antecipacao/"
    - "outputs/multiplicar/efesios-encarnado/"
    - "outputs/conteudo-cultos/2026-05-domingo-pentecostes/"
    - "apps/publisher-instagram/publicar/NN-YYYY-MM-DD-HHMM-slug/"

workspace_integration:
  level: controlled_runtime_consumer
  rationale: >-
    Conteudo depende de contexto canonico de ICP, brand, posicionamento,
    voz da marca e movimento para produzir conteudo alinhado ao negocio.
    Output principal (posts, reels, carrosseis) vive fora do workspace.
  read_paths:
    - workspace/config.yaml
    - workspace/businesses/{business}/company/company-profile.yaml
    - workspace/businesses/{business}/company/icp.yaml
    - workspace/businesses/{business}/company/offerbook.yaml
    - workspace/businesses/{business}/brand/brandbook.yaml
    - workspace/businesses/{business}/brand/messaging-framework.yaml
    - workspace/businesses/{business}/culture/pillars.yaml
    - workspace/businesses/{business}/culture/values.yaml
    - workspace/businesses/{business}/movement/
  write_paths: []
  readiness_owner: coo-orchestrator
  contract:
    events_emitted:
      - "content.created"
      - "content.validated"
      - "content.published"
      - "content.performance_tracked"
    events_consumed: []
  domains:
    primary: "content-marketing"
    secondary: ["instagram", "social-media", "branding"]
  governance:
    protocol: "squads/squad-creator-pro/protocols/ai-first-governance.md"
    quality_gates:
      - "oraculo-posts"
      - "oraculo-reels"
      - "content-rules"
      - "hook-quality"
